<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a2e;
      color: #eee;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      letter-spacing: 2px;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.5rem;
      color: #a0c4ff;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 8px;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
    }

    .cell.x { color: #ff6b6b; }
    .cell.o { color: #a0c4ff; }
    .cell.win { background: #0f3460; outline: 3px solid #f9c74f; }

    #reset {
      margin-top: 1.8rem;
      padding: 0.6rem 2rem;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      transition: background 0.15s;
    }

    #reset:hover { background: #c73652; }

    #scoreboard {
      display: flex;
      gap: 2rem;
      margin-top: 1.5rem;
      font-size: 1rem;
      color: #ccc;
    }

    .score span { font-weight: bold; font-size: 1.3rem; }
    .score.x-score span { color: #ff6b6b; }
    .score.o-score span { color: #a0c4ff; }
    .score.draw-score span { color: #aaa; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="status">Player X's turn</div>
  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>
  <button id="reset">New Game</button>
  <div id="scoreboard">
    <div class="score x-score">X Wins: <span id="x-wins">0</span></div>
    <div class="score draw-score">Draws: <span id="draws">0</span></div>
    <div class="score o-score">O Wins: <span id="o-wins">0</span></div>
  </div>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, gameOver, scores;

    function init() {
      board = Array(9).fill('');
      current = 'X';
      gameOver = false;
      scores = scores || { X: 0, O: 0, D: 0 };

      document.querySelectorAll('.cell').forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
      setStatus(`Player X's turn`);
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    function checkWin() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return [a, b, c];
        }
      }
      return null;
    }

    document.getElementById('board').addEventListener('click', e => {
      const cell = e.target.closest('.cell');
      if (!cell || gameOver || board[cell.dataset.i]) return;

      const i = cell.dataset.i;
      board[i] = current;
      cell.textContent = current;
      cell.classList.add(current.toLowerCase(), 'taken');

      const win = checkWin();
      if (win) {
        win.forEach(idx => document.querySelector(`[data-i="${idx}"]`).classList.add('win'));
        setStatus(`Player ${current} wins!`);
        scores[current]++;
        updateScores();
        gameOver = true;
      } else if (board.every(Boolean)) {
        setStatus("It's a draw!");
        scores.D++;
        updateScores();
        gameOver = true;
      } else {
        current = current === 'X' ? 'O' : 'X';
        setStatus(`Player ${current}'s turn`);
      }
    });

    function updateScores() {
      document.getElementById('x-wins').textContent = scores.X;
      document.getElementById('o-wins').textContent = scores.O;
      document.getElementById('draws').textContent = scores.D;
    }

    document.getElementById('reset').addEventListener('click', init);

    init();
  </script>
</body>
</html>
